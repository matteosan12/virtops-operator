apiVersion: v1
kind: ServiceAccount
metadata:
  name: virtops-operator
  namespace: virt-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: virtops-operator-role
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachineinstances", "virtualmachineinstances/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["guestops.io"]
    resources: ["admincredentialrotationpolicies", "admincredentialrotationpolicies/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["guestops.io"]
    resources: ["admincredentialrotationpolicies/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: virtops-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: virtops-operator-role
subjects:
  - kind: ServiceAccount
    name: virtops-operator
    namespace: virt-ops
