apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: admincredentialrotationpolicies.guestops.io
spec:
  group: guestops.io
  scope: Namespaced
  names:
    plural: admincredentialrotationpolicies
    singular: admincredentialrotationpolicy
    kind: AdminCredentialRotationPolicy
    shortNames:
      - acrp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: OS
          type: string
          jsonPath: .spec.os
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Publish
          type: string
          jsonPath: .spec.publish.mode
        - name: LastRun
          type: date
          jsonPath: .status.lastRunTime
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                targets:
                  type: object
                  properties:
                    selector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                    networkSelection:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum: ["auto", "podOnly", "nadList"]
                        preferPod:
                          type: boolean
                        nadList:
                          type: array
                          items:
                            type: string
                    networkAttachments:
                      type: array
                      items:
                        type: string
                os:
                  type: string
                  enum: ["linux", "windows"]
                method:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: ["ssh", "winrm"]
                    user:
                      type: string
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                    tls:
                      type: boolean
                    auth:
                      type: object
                      properties:
                        bootstrapSecretRef:
                          type: string
                  required: [type, auth]
                rotation:
                  type: object
                  properties:
                    kind:
                      type: string
                      enum: ["ssh-key", "linux-password", "windows-password"]
                    authorizedKeysMode:
                      type: string
                      enum: ["replace", "append"]
                    source:
                      type: string
                      enum: ["generate", "provided", "external"]
                    providedSecretRef:
                      type: string
                    externalSecretRef:
                      type: string
                    length:
                      type: integer
                      minimum: 8
                    passwordPolicy:
                      type: object
                      properties:
                        length:
                          type: integer
                          minimum: 8
                        minLength:
                          type: integer
                          minimum: 8
                        maxLength:
                          type: integer
                          minimum: 8
                        minUpper:
                          type: integer
                          minimum: 0
                        minLower:
                          type: integer
                          minimum: 0
                        minDigits:
                          type: integer
                          minimum: 0
                        minSpecial:
                          type: integer
                          minimum: 0
                    overlapSeconds:
                      type: integer
                      minimum: 0
                  required: [kind, source]
                schedule:
                  type: string
                publish:
                  type: object
                  properties:
                    mode:
                      type: string
                      enum: ["Always", "TestingOnly", "Never"]
                    secretName:
                      type: string
                safety:
                  type: object
                  properties:
                    retryAttempts:
                      type: integer
                      minimum: 0
                    backoffSeconds:
                      type: integer
                      minimum: 0
                    pauseOnError:
                      type: boolean
                    maxFailures:
                      type: integer
                      minimum: 0
                concurrency:
                  type: object
                  properties:
                    maxConcurrent:
                      type: integer
                      minimum: 1
                    reachabilityTimeoutSeconds:
                      type: integer
                      minimum: 1
                trigger:
                  type: object
                  properties:
                    enableAnnotation:
                      type: boolean
              required: [targets, os, method, rotation]
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                nextRunTime:
                  type: string
                lastRunTime:
                  type: string
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      vmName:
                        type: string
                      phase:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      rotatedAt:
                        type: string
      subresources:
        status: {}
